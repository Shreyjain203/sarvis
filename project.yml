name: Sarvis

options:
  bundleIdPrefix: com.shrey.sarvis
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

fileGroups:
  - project.yml
  - setup.sh

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic

targets:
  Sarvis:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sarvis
    resources:
      - path: Sarvis/Resources/Prompts
      - path: Sarvis/Resources/Quotes
    info:
      path: Sarvis/Info.plist
      properties:
        CFBundleDisplayName: Sarvis
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.shrey.sarvis.morning
        CFBundleURLTypes:
          - CFBundleURLName: com.shrey.sarvis
            CFBundleURLSchemes:
              - sarvis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shrey.sarvis
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
